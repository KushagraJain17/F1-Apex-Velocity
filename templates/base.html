<!DOCTYPE html>
<html lang="en" class="dark">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}APEX VELOCITY{% endblock %}</title>
  <!-- Tailwind (utility overrides only) -->
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary-container": "#e10600",
            "on-primary-container": "#fff2f0",
            "surface": "#131313",
            "surface-dim": "#0e0e0e",
            "surface-container-lowest": "#0e0e0e",
            "surface-container-low": "#1c1b1b",
            "surface-container": "#201f1f",
            "surface-container-high": "#2a2a2a",
            "surface-container-highest": "#353534",
            "surface-bright": "#3a3939",
            "on-surface": "#e5e2e1",
            "on-background": "#e5e2e1",
            "background": "#131313",
            "outline-variant": "#5e3f3a",
            "tertiary": "#b4c5ff",
            "tertiary-container": "#0163ff",
            "error": "#ffb4ab",
            "primary": "#ffb4a8",
            "secondary": "#c8c6c5",
            "secondary-container": "#474746",
          },
          fontFamily: {
            "headline": ["Space Grotesk", "sans-serif"],
            "body": ["Inter", "sans-serif"],
            "label": ["Space Grotesk", "sans-serif"],
          },
          borderRadius: { DEFAULT: "0px", lg: "0px", xl: "0px", full: "9999px" },
        },
      },
    }
  </script>
  <!-- Global Design System -->
  <link rel="stylesheet" href="/static/global.css" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
  {% block head %}{% endblock %}
</head>

<body>

  <!-- ═══ TOP NAV ═══════════════════════════════════════════ -->
  <nav class="nav-top">
    <div style="display:flex; align-items:center; gap:2.5rem;">
      <a href="/" class="nav-brand">APEX VELOCITY</a>
      <div class="nav-links">
        <a href="/schedule" class="nav-link {% if active_page=='schedule' %}active{% endif %}">
          <span class="material-symbols-outlined">map</span>
          <span>SCHEDULE</span>
        </a>
        <a href="/standings" class="nav-link {% if active_page=='standings' %}active{% endif %}">
          <span class="material-symbols-outlined">leaderboard</span>
          <span>DRIVER STANDINGS</span>
        </a>
        <a href="/standings/constructors" class="nav-link {% if active_page=='constructors' %}active{% endif %}">
          <span class="material-symbols-outlined">emoji_events</span>
          <span>CONSTRUCTORS</span>
        </a>
        <a href="/archives" class="nav-link {% if active_page=='archives' %}active{% endif %}">
          <span class="material-symbols-outlined">history</span>
          <span>ARCHIVES</span>
        </a>
        <a href="/telemetry" class="nav-link {% if active_page=='telemetry' %}active{% endif %}">
          <span class="material-symbols-outlined">monitoring</span>
          <span>TELEMETRY</span>
        </a>
      </div>
    </div>

    <!-- Status Group -->
    <div style="display:flex; align-items:center; gap:1rem;">
      <div class="nav-top-status hide-mobile">
        <div class="nav-side-status-dot" style="margin-bottom:0;"></div>
        <div style="display:flex; flex-direction:column; justify-content:center;">
          <span class="nav-side-status-label" style="font-size:0.5rem; line-height:1;">SYSTEM STATUS:</span>
          <span class="nav-side-status-value" style="margin-top:2px; font-size:0.6rem;">OPTIMAL PERFORMANCE</span>
        </div>
      </div>
    </div>
  </nav>

  <!-- ═══ MAIN SHELL ════════════════════════════════════════ -->
  <div class="page-shell">
    {% block content %}{% endblock %}
  </div>

  {% block scripts %}{% endblock %}
</body>

</html>
